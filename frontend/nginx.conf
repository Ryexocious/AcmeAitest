server {
    listen 80;

    # Set root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files and fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend (optional, if you want to avoid CORS and hardcoded URLs in frontend)
    # location /api/ {
    #     proxy_pass http://backend:5000/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
